name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r audiobooker/requirements.txt
          pip install -r audiobooker/requirements-dev.txt

      - name: Lint and type-check
        run: |
          ruff check audiobooker
          ruff format --check audiobooker
          black --check --line-length=100 audiobooker
          mypy --config-file audiobooker/pyproject.toml audiobooker

      - name: Run tests
        run: |
          python -m unittest discover -s audiobooker/tests -v